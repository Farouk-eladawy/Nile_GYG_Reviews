name: GYG Airtable Sync

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Needed to push cache/state files back

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests python-dotenv pyotp
          playwright install chromium

      - name: Run Scraper
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          GYG_EMAIL: ${{ secrets.GYG_EMAIL }}
          GYG_PASSWORD: ${{ secrets.GYG_PASSWORD }}
          GYG_2FA_SECRET: ${{ secrets.GYG_2FA_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          HEADLESS_MODE: "true"
        run: |
          python gyg_sync.py --once

      - name: Commit and push cache and state files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.json
          git commit -m "chore: update cache and auth state [skip ci]" || echo "No changes to commit"
          git push